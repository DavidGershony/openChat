name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/Scramble.Native

    - name: Build Rust native DLL
      run: cargo build --release --manifest-path src/Scramble.Native/Cargo.toml

    - name: Copy DLL to Desktop project
      run: cp src/Scramble.Native/target/release/scramble_native.dll src/Scramble.Desktop/

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install Android workload
      run: dotnet workload install android

    - name: Restore dependencies
      run: dotnet restore Scramble.Desktop.slnf

    - name: Build
      run: dotnet build Scramble.Desktop.slnf --no-restore --configuration ${{ matrix.configuration }}

    - name: Execute unit tests
      run: dotnet test Scramble.Desktop.slnf --no-build --configuration ${{ matrix.configuration }} --filter "Category!=Relay"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.configuration }}
        path: |
          src/Scramble.Desktop/bin/${{ matrix.configuration }}/
