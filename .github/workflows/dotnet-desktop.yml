name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/Scramble.Native

    - name: Build Rust native DLL
      run: cargo build --release --manifest-path src/Scramble.Native/Cargo.toml

    - name: Copy DLL to Desktop project
      run: cp src/Scramble.Native/target/release/scramble_native.dll src/Scramble.Desktop/

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    # Desktop CI does not build the Android target. Pass DesktopOnly=true so
    # Scramble.Core compiles only for net9.0 — its net9.0-android target needs
    # the MDK submodules to ship Android-compatible binaries, which they don't.
    - name: Restore dependencies
      run: dotnet restore Scramble.Desktop.slnf -p:DesktopOnly=true

    - name: Build
      run: dotnet build Scramble.Desktop.slnf --no-restore --configuration ${{ matrix.configuration }} -p:DesktopOnly=true

    - name: Execute unit tests
      run: dotnet test Scramble.Desktop.slnf --no-build --configuration ${{ matrix.configuration }} --filter "Category!=Relay" -p:DesktopOnly=true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.configuration }}
        path: |
          src/Scramble.Desktop/bin/${{ matrix.configuration }}/
