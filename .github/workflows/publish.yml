name: Publish Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.6.32)'
        required: true

jobs:
  build-desktop:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            native_lib: scramble_native.dll
            artifact_name: Scramble-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            native_lib: libscramble_native.so
            artifact_name: Scramble-linux-x64
          - os: macos-latest
            rid: osx-arm64
            native_lib: libscramble_native.dylib
            artifact_name: Scramble-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Scramble.Native

      - name: Build Rust native library
        run: cargo build --release --manifest-path src/Scramble.Native/Cargo.toml

      - name: Copy native library to Desktop project
        run: cp src/Scramble.Native/target/release/${{ matrix.native_lib }} src/Scramble.Desktop/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Desktop (single file)
        run: dotnet publish src/Scramble.Desktop/Scramble.Desktop.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DesktopOnly=true --output ./publish

      - name: Rename artifact
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            mv ./publish/Scramble.Desktop.exe ./publish/${{ matrix.artifact_name }}
          else
            mv ./publish/Scramble.Desktop ./publish/${{ matrix.artifact_name }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/${{ matrix.artifact_name }}

  # Two Android APK builds shipped side-by-side in the same release:
  #   * Scramble-native.apk    — original Android Fragments UI (src/Scramble.Android),
  #                              package id app.scramble.chat. Canonical per CLAUDE.md.
  #   * Scramble-avalonia.apk  — Avalonia mobile head (src/Scramble.Mobile.Android),
  #                              package id app.scramble.chat.avalonia. Parallel
  #                              candidate; installs alongside the native build so
  #                              users can pick one or run both for comparison.
  # Both jobs reuse a single matrix entry per head so we only maintain one set of
  # signing / version-extraction steps. Both use the same keystore secret — same
  # publisher signs both APKs, which is the correct semantics.
  build-android:
    strategy:
      fail-fast: false  # one head's failure shouldn't kill the other's APK build
      matrix:
        include:
          - head: native
            project: src/Scramble.Android/Scramble.Android.csproj
            framework: net10.0-android
            artifact_name: Scramble-native.apk
          - head: avalonia
            project: src/Scramble.Mobile.Android/Scramble.Mobile.Android.csproj
            framework: net10.0-android
            artifact_name: Scramble-avalonia.apk

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        # Pin to workload set 10.0.203.1 (verified locally — produces a working
        # signed APK end-to-end). Without the pin, the runner installs whichever
        # workload set is bundled with the floating SDK install, which has been
        # newer manifest 36.1.2 / set 10.0.200.x — that one references
        # Microsoft.NETCore.App.Runtime.Mono.{linux,win}-x64 v10.0.x runtime
        # packs that aren't on any public NuGet feed (NU1102 in v0.6.58 runs).
        # Workload sets are published to nuget.org under
        # Microsoft.NET.Workloads.10.0.200; verify a version exists there before
        # bumping. Kept scoped to this job (not global.json) so the desktop
        # builds don't have to install the android workload they don't use.
        run: dotnet workload install android --version 10.0.203.1

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_EVENT_NAME:+${GITHUB_REF_NAME#v}}
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          # Derive versionCode from version: 0.6.30 → 60030 (major*10000 + minor*1000 + patch)
          IFS='.' read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$(( major * 10000 + minor * 1000 + patch ))
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/scramble-release.keystore

      - name: Build Android APK (${{ matrix.head }})
        env:
          ANDROID_SIGNING_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: >
          dotnet publish ${{ matrix.project }}
          --configuration Release
          --framework ${{ matrix.framework }}
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.VERSION }}
          -p:ApplicationVersion=${{ steps.version.outputs.VERSION_CODE }}
          -p:AndroidSigningKeyStore=${{ github.workspace }}/scramble-release.keystore
          -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          -p:AndroidSigningKeyPass=env:ANDROID_SIGNING_PASSWORD
          -p:AndroidSigningStorePass=env:ANDROID_SIGNING_PASSWORD
          -p:AndroidUseApkSigner=true
          -p:AndroidPackageFormat=apk
          --output ./publish/android-${{ matrix.head }}

      - name: Find and rename APK (${{ matrix.head }})
        id: apk
        run: |
          # Always pick the signed APK explicitly. dotnet publish produces both
          # `<id>.apk` (unsigned) and `<id>-Signed.apk`, and find without sorting
          # returns them in filesystem order — picking the unsigned one ships an
          # uninstallable APK (this happened in v0.6.49). Fail loudly if signing
          # didn't produce a signed artifact instead of silently shipping the wrong file.
          APK=$(find ./publish/android-${{ matrix.head }} -name '*-Signed.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No signed APK (*-Signed.apk) found for ${{ matrix.head }} head. Signing step may have failed." >&2
            echo "Contents of ./publish/android-${{ matrix.head }}:" >&2
            ls -la ./publish/android-${{ matrix.head }} >&2
            exit 1
          fi
          echo "Using signed APK: $APK"
          mv "$APK" ./publish/android-${{ matrix.head }}/${{ matrix.artifact_name }}
          echo "APK_PATH=./publish/android-${{ matrix.head }}/${{ matrix.artifact_name }}" >> "$GITHUB_OUTPUT"

      - name: Upload Android artifact (${{ matrix.head }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.apk.outputs.APK_PATH }}

  release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          # Two Android APKs are published side-by-side:
          #   Scramble-native.apk   — original Android Fragments head (canonical)
          #   Scramble-avalonia.apk — Avalonia mobile head (parallel candidate)
          # They install as separate apps (different package ids) so users can try
          # both without uninstalling either.
          files: |
            ./artifacts/Scramble-win-x64.exe/Scramble-win-x64.exe
            ./artifacts/Scramble-linux-x64/Scramble-linux-x64
            ./artifacts/Scramble-macos-arm64/Scramble-macos-arm64
            ./artifacts/Scramble-native.apk/Scramble-native.apk
            ./artifacts/Scramble-avalonia.apk/Scramble-avalonia.apk
