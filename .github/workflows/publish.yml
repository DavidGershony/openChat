name: Publish Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.6.32)'
        required: true

jobs:
  # Gate: run the test suite before building any release artifacts.
  # Mirrors the test step from dotnet-desktop.yml so a tag push cannot
  # produce a release with failing tests.
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/Scramble.Native

      - name: Build Rust native DLL
        run: cargo build --release --manifest-path src/Scramble.Native/Cargo.toml

      - name: Copy DLL to Desktop project
        run: cp src/Scramble.Native/target/release/scramble_native.dll src/Scramble.Desktop/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Scramble.Desktop.slnf -p:DesktopOnly=true

      - name: Build
        run: dotnet build Scramble.Desktop.slnf --no-restore --configuration Release -p:DesktopOnly=true

      - name: Execute unit tests
        run: dotnet test Scramble.Desktop.slnf --no-build --configuration Release --filter "Category!=Relay&Category!=Integration" -p:DesktopOnly=true

  build-desktop:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: Scramble-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: Scramble-linux-x64
          - os: macos-latest
            rid: osx-arm64
            artifact_name: Scramble-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_EVENT_NAME:+${GITHUB_REF_NAME#v}}
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Publish Desktop (single file)
        run: dotnet publish src/Scramble.Desktop/Scramble.Desktop.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DesktopOnly=true --output ./publish

      - name: Rename artifact
        id: artifact
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE="${{ matrix.artifact_name }}"
          if [ -n "$VERSION" ]; then
            # Insert version before the extension (or at end if no extension)
            case "$BASE" in
              *.exe) NAME="${BASE%.exe}-${VERSION}.exe" ;;
              *)     NAME="${BASE}-${VERSION}" ;;
            esac
          else
            NAME="$BASE"
          fi
          echo "NAME=$NAME" >> "$GITHUB_OUTPUT"
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            mv ./publish/Scramble.Desktop.exe "./publish/$NAME"
          else
            mv ./publish/Scramble.Desktop "./publish/$NAME"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.NAME }}
          path: ./publish/${{ steps.artifact.outputs.NAME }}

  build-android:
    needs: [test]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        # Pin to workload set 10.0.203.1 (verified locally — produces a working
        # signed APK end-to-end). Without the pin, the runner installs whichever
        # workload set is bundled with the floating SDK install, which has been
        # newer manifest 36.1.2 / set 10.0.200.x — that one references
        # Microsoft.NETCore.App.Runtime.Mono.{linux,win}-x64 v10.0.x runtime
        # packs that aren't on any public NuGet feed (NU1102 in v0.6.58 runs).
        # Workload sets are published to nuget.org under
        # Microsoft.NET.Workloads.10.0.200; verify a version exists there before
        # bumping. Kept scoped to this job (not global.json) so the desktop
        # builds don't have to install the android workload they don't use.
        run: dotnet workload install android --version 10.0.203.1

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_EVENT_NAME:+${GITHUB_REF_NAME#v}}
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          # Derive versionCode from version: 0.6.30 → 60030 (major*10000 + minor*1000 + patch)
          IFS='.' read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$(( major * 10000 + minor * 1000 + patch ))
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/scramble-release.keystore

      - name: Build Android APK
        env:
          ANDROID_SIGNING_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: >
          dotnet publish src/Scramble.Mobile.Android/Scramble.Mobile.Android.csproj
          --configuration Release
          --framework net10.0-android
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.VERSION }}
          -p:ApplicationVersion=${{ steps.version.outputs.VERSION_CODE }}
          -p:AndroidSigningKeyStore=${{ github.workspace }}/scramble-release.keystore
          -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          -p:AndroidSigningKeyPass=env:ANDROID_SIGNING_PASSWORD
          -p:AndroidSigningStorePass=env:ANDROID_SIGNING_PASSWORD
          -p:AndroidUseApkSigner=true
          -p:AndroidPackageFormat=apk
          --output ./publish/android

      - name: Find and rename APK
        id: apk
        run: |
          # Always pick the signed APK explicitly. dotnet publish produces both
          # `<id>.apk` (unsigned) and `<id>-Signed.apk`, and find without sorting
          # returns them in filesystem order — picking the unsigned one ships an
          # uninstallable APK (this happened in v0.6.49). Fail loudly if signing
          # didn't produce a signed artifact instead of silently shipping the wrong file.
          APK=$(find ./publish/android -name '*-Signed.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No signed APK (*-Signed.apk) found. Signing step may have failed." >&2
            echo "Contents of ./publish/android:" >&2
            ls -la ./publish/android >&2
            exit 1
          fi
          echo "Using signed APK: $APK"
          mv "$APK" ./publish/android/Scramble.apk
          echo "APK_PATH=./publish/android/Scramble.apk" >> "$GITHUB_OUTPUT"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scramble.apk
          path: ${{ steps.apk.outputs.APK_PATH }}

  release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            ./artifacts/Scramble-win-x64*/Scramble-win-x64*
            ./artifacts/Scramble-linux-x64*/Scramble-linux-x64*
            ./artifacts/Scramble-macos-arm64*/Scramble-macos-arm64*
            ./artifacts/Scramble.apk/Scramble.apk
